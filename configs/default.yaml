data_path: "SEED"

model_name: "gcenet"

model:
  n_classes: 3
  n_domains: 15
  dropout: 0.5
  dropedge_p: 0.2

training:
  seed: 42
  batch_size: 32
  epochs: 50
  lr: 0.001
  cal_lr: 0.0003
  warmup_epochs: 0
  ramp_epochs: 0
  early_stop_patience: 8
  early_stop_min_epochs: 15
  lr_factor: 0.5
  lr_patience: 5
  use_ordinal: true
  ordinal_w2: 1.5

loss:
  lambda_dann1: 0.5
  lambda_dann2: 0.5
  lambda_supcon: 0.3
  temperature: 0.2
  label_smoothing: 0.1

ablation:
  use_gcn: true
  use_dann1: true
  use_dann2: true
  use_supcon: true
  use_spatial_pool: true

cv:
  n_folds: 15

paths:
  extracted_features: "SEED/ExtractedFeatures"
  preprocessed_eeg: "SEED/Preprocessed_EEG"
  adjacency_matrix: "static/adjacency_62.pt"
  runs: "runs"
  checkpoints: "checkpoints"
  results: "results"

eegnet:
  input_channels: 1
  input_time: 200
  target_time: 200
  F1: 8
  D: 2
  F2: 16

gcenet:
  in_channels: 5
  input_time: 200
  target_time: 200
  num_electrodes: 62
  temp_filters: 40
  gcn_hidden: 64
  stage3_channels: 64
  se_reduction: 4
  supcon_dim: 128

calibration:
  per_class_ablation: [1, 2]
  lora_rank: 4
  lora_alpha: 2.0
  stage_epochs: [10, 3, 3]
  stage_patience: [2, 2, 3]
  stage_lr_scale: [0.3, 0.15, 0.05]
  aug_noise: 0.01
  weight_decay: 0.0001
  cal_alpha: 0.0
  distill_alpha: 0.0
  distill_temperature: 3.0
  feature_distill_alpha: 0.0
  aug_repeats: 3

ea:
  enabled: false
